name: "publish"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm64 (M1/M2)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-13" # for Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only needed on macos runner to cross compile
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install
        working-directory: snatch-ui

      - name: build snatch CLI sidecar
        run: cargo build --release

      - name: Prepare sidecar binary (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p snatch-ui/src-tauri/binaries
          cp target/release/snatch snatch-ui/src-tauri/binaries/snatch-x86_64-unknown-linux-gnu

      - name: Prepare sidecar binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p snatch-ui/src-tauri/binaries
          cp target/release/snatch.exe snatch-ui/src-tauri/binaries/snatch-x86_64-pc-windows-msvc.exe

      - name: Prepare sidecar binary (macOS Intel)
        if: matrix.platform == 'macos-13'
        run: |
          mkdir -p snatch-ui/src-tauri/binaries
          cp target/release/snatch snatch-ui/src-tauri/binaries/snatch-x86_64-apple-darwin

      - name: Prepare sidecar binary (macOS Arm64)
        if: matrix.platform == 'macos-latest'
        run: |
          # We need to build the sidecar for the target architecture
          rustup target add aarch64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p snatch-ui/src-tauri/binaries
          cp target/aarch64-apple-darwin/release/snatch snatch-ui/src-tauri/binaries/snatch-aarch64-apple-darwin

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION__ with the app version
          releaseName: "snatch v__VERSION__"
          releaseBody: "See the assets below to download the latest version of snatch."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: snatch-ui
